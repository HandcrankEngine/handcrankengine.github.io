services:
  build:
    build:
      context: .
      args:
        EMSDK_VERSION: 5.0.7
        SDL_VERSION: 3.4.10
        SDL_IMAGE_VERSION: 3.4.4
        SDL_TTF_VERSION: 3.2.2
        SDL_MIXER_VERSION: 3.2.4
    volumes:
      - ./build:/app/build
    command: sh -c "cp -r /tmp/dist/* /app/build/ && chmod -R 777 /app/build/"
