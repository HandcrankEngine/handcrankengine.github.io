services:
  test:
    build:
      context: .
      args:
        SDL_VERSION: 2.32.10
        SDL_IMAGE_VERSION: 2.8.12
        SDL_TTF_VERSION: 2.24.0
        SDL_MIXER_VERSION: 2.8.2
    volumes:
      - ./build:/app/build
    command: sh -c "cp -r /tmp/dist/* /app/build/ && chmod -R 777 /app/build/"
