name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-emscripten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: HandcrankEngine/install-sdl-packages@3dd8adf2ce1e6698313aecb05a2f8fa59be27b8c # v0.4.1
        with:
          BUILD_SDL_FOR_EMSCRIPTEN: true
          SDL_VERSION: 3.4.10
          SDL_IMAGE_VERSION: 3.4.4
          SDL_TTF_VERSION: 3.2.2
          SDL_MIXER_VERSION: 3.2.4

      - name: Build WebGL
        run: |
          build-demo() {
            NAME="${1}"
            emcc -std=c++17 -Os -o "demos/${NAME}/${NAME}.js" "demos/${NAME}/${NAME}.cpp" \
              -I./include \
              -I"${SDL_PATH}/include" -L"${SDL_PATH}/lib" \
              -I"${SDL_IMAGE_PATH}/include" -L"${SDL_IMAGE_PATH}/lib" \
              -I"${SDL_TTF_PATH}/include" -L"${SDL_TTF_PATH}/lib" \
              -I"${SDL_MIXER_PATH}/include" -L"${SDL_MIXER_PATH}/lib" \
              -lSDL3 -lSDL3_image -lSDL3_ttf -lSDL3_mixer \
              -s USE_FREETYPE=1 -s USE_HARFBUZZ=1 \
              -s MAX_WEBGL_VERSION=2 \
              -s MODULARIZE=1 -s EXPORT_NAME="${NAME}Module" --pre-js ./bin/sdl-mod.js
          }
          build-demo "demo"
          build-demo "animation"
          build-demo "drawRectRenderer"
          build-demo "simpleEventLoop"
          build-demo "spriteRenderer"
          build-demo "svg"
          build-demo "tiledPlugin"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./demos
          overwrite: true

  build-web:
    runs-on: ubuntu-latest
    needs: build-emscripten
    env:
      TZ: 'America/New_York'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./demos

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build-emscripten, build-web]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
